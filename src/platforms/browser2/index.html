<!DOCTYPE html>
<html>
<head>
    <title>Lua Sidecar x WASM Bridge</title>
    <script src="https://unpkg.com/fengari-web/dist/fengari-web.js" type="text/javascript"></script>
</head>
<body>
    <h1>OSRS Lua-WASM Sidecar</h1>
    <div id="status">Initializing...</div>

    <script type="module">
        import { LuaSidecar } from './sidecar.js';

        async function init() {
            // 1. Load the WASM module
            // We expect exports: memory, malloc, free, update_entity
            const response = await fetch('game.wasm');
            const bytes = await response.arrayBuffer();
            const wasmModule = await WebAssembly.instantiate(bytes, {
                env: {
                    console_log: (ptr, len) => {
                        const view = new Uint8Array(wasmModule.instance.exports.memory.buffer, ptr, len);
                        console.log(new TextDecoder().decode(view));
                    }
                }
            });

            const wasm = wasmModule.instance;

            // 2. Initialize the Lua Sidecar
            const sidecar = new LuaSidecar(wasm);
            
            // 3. Start a Lua Script
            document.getElementById('status').innerText = "Running Script...";
            await sidecar.runScript('init_cache.lua');
            document.getElementById('status').innerText = "Script Complete.";
        }

        init().catch(err => console.error(err));
    </script>
</body>
</html>
