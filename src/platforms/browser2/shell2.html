<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>RSClient Web</title>
    <script>
     (function() {
    'use strict';

    // Core logic for relative indexing
    function at(index) {
        // 1. Convert index to an integer
        index = Math.trunc(index) || 0;
        // 2. Handle negative indexing
        if (index < 0) index += this.length;
        // 3. Return undefined if out of bounds
        if (index < 0 || index >= this.length) return undefined;
        // 4. Return the element
        return this[index];
    }

    // 1. Patch Array.prototype
    if (!Array.prototype.at) {
        Object.defineProperty(Array.prototype, 'at', {
            value: at,
            configurable: true,
            writable: true
        });
        console.log("Polyfilled Array.prototype.at");
    }

    // 2. Patch String.prototype
    if (!String.prototype.at) {
        Object.defineProperty(String.prototype, 'at', {
            value: at,
            configurable: true,
            writable: true
        });
        console.log("Polyfilled Array.prototype.at");
    }

    // 3. Patch TypedArray prototypes (Uint8Array, Float32Array, etc.)
    // We get the hidden "TypedArray" base class by looking at Uint8Array's prototype
    if (typeof window.Uint8Array !== 'undefined') {
        var TypedArray = Object.getPrototypeOf(Uint8Array.prototype);
        if (TypedArray && !TypedArray.at) {
            Object.defineProperty(TypedArray, 'at', {
                value: at,
                configurable: true,
                writable: true
            });
            console.log("Polyfilled TypedArray.prototype.at");
        }
    }
})();
    </script>
    <style>
      body {
        font-family: Tahoma, Geneva, sans-serif;
        background-color: #222;
        color: white;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      /* The canvas must be styled to maintain aspect ratio or fill the screen */
      canvas.emscripten {
        border: 0 none;
        background-color: black;
        width: 800px;  /* Match your game's default resolution */
        height: 600px;
        image-rendering: pixelated; /* Keeps the OSRS aesthetic crisp */
      }

      .status {
        margin-top: 10px;
        font-size: 14px;
      }

      .shell-controls {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
      }

      .shell-controls button {
        font: inherit;
        padding: 6px 12px;
        cursor: pointer;
        background: #444;
        color: #fff;
        border: 1px solid #666;
        border-radius: 4px;
      }

      .shell-controls button:hover {
        background: #555;
      }

      canvas.emscripten.fill-viewport {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      body.canvas-fill-viewport .status {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        margin-top: 0;
      }

      body.canvas-fill-viewport .shell-controls {
        z-index: 3;
      }
    </style>
  </head>
  <body>

    <div class="shell-controls">
      <button type="button" id="btn-fill-viewport">Fill viewport</button>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    
    <div class="status" id="status">Downloading...</div>
    <script src="./fengari-web.js"></script>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');

      (function () {
        var canvas = document.getElementById('canvas');
        var btn = document.getElementById('btn-fill-viewport');
        if (canvas && btn) {
          var full = false;
          btn.addEventListener('click', function () {
            full = !full;
            document.body.classList.toggle('canvas-fill-viewport', full);
            canvas.classList.toggle('fill-viewport', full);
            btn.textContent = full ? 'Default canvas size' : 'Fill viewport';
          });
        }
      })();

      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.log(text);
          };
        })(),
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          // This allows the canvas to capture resize events
          canvas.addEventListener("webglcontextlost", function(e) { 
            alert('WebGL context lost. You will need to reload the page.'); 
            e.preventDefault(); 
          }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = function() {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function(text) {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>

    <script type="module" src="./luajs_sidecar_fnnos.js"></script>
    <script type="module">
        import { LuaJSSidecar } from './luajs_sidecar.js';
        import { LibToriRSPlatformJS } from './netjs.js';

        let netSidecar = null;

        function onRSClientLooped(event, luaSidecar) {  
          netSidecar?.tick();
          if (window.LUA_SCRIPT_QUEUE && window.LUA_SCRIPT_QUEUE.length > 0) {
            const scriptPath = window.LUA_SCRIPT_QUEUE.shift();
            console.log(`Executing Lua script from queue: ${scriptPath}`);
            luaSidecar.enqueueScript(scriptPath);
          }
        }

        function getWsUrl() {
          const params = new URLSearchParams(window.location.search);
          return params.get('ws') || `ws://${window.location.hostname}:43594`;
        }

        function onRSClientReady(event) {
          console.log('RSClient is ready! Event detail:', event.detail);
          if (!window.gamePtr) {
            console.error('Game pointer not found');
            return;
          }
          netSidecar = new LibToriRSPlatformJS(Module, window.gamePtr);
          // When a script is not in IndexedDB, load it from this URL (e.g. node serve-lua-scripts.js)
          const luaSidecar = new LuaJSSidecar(Module, {
            scriptBaseUrl: `http://${window.location.hostname}:8081/`
          });

          // write a test.lua script to indexedDB for testing
          const testLuaScript = `
            print("Hello from Lua!")
            function my_lua_function(arg1, arg2)
              return coroutine.yield(3, arg1, arg2)
            end

            my_lua_function(1, 123)

            print("Lua DONE!")
          `;
          const request = indexedDB.open("RSClientScripts", 2); // Ensure version is at least 1




          request.onupgradeneeded = (event) => {
              const db = event.target.result;
              
              // Check if the store already exists to avoid errors on version bumps
              if (!db.objectStoreNames.contains("cache")) {
                  // Create the store. 'path' will be the unique key (like a file system)
                  db.createObjectStore("cache", { keyPath: "path" });
                  console.log("IndexedDB 'cache' store created.");
              }
          };

          request.onsuccess = (event) => {
              // NOW you can run your code
              const db = event.target.result;
              const tx = db.transaction("cache", "readwrite");
              const store = tx.objectStore("cache");
              
              store.put({ path: "test.lua", content: testLuaScript });
              
              tx.oncomplete = () => {
                  console.log("Test Lua script cached in IndexedDB.");
                  window.addEventListener('rs_client_looped', (e) => onRSClientLooped(e, luaSidecar));
              };
          };

          // Example: Call a Lua function from JavaScript
          // luaSidecar.callLuaFunction('my_lua_function', arg1, arg2);
          window.removeEventListener('rs_client_ready', onRSClientReady);
        }
        
        window.addEventListener('rs_client_ready', onRSClientReady);

    </script>

  </body>
</html>
